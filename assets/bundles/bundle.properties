## Settings
mas-settings = Automatic Sync
mas-choose-location = Choose location
mas-choose-file = Mindustry file export
setting.mas-export-location.name = Export file
setting.mas-enable-export.name = Enable automatic export
setting.mas-enable-import.name = Load save when changed
setting.mas-enable-import.description = Only loads save on game start

## Status messages
mas-invalid-import = An error occurred when automatically importing your save.\nGo into the settings to select the right file again.
mas-invalid-export = An error occurred when automatically exporting your save
mas-successful-import = Game save has been synced
mas-insufficient-permissions = MAS was unable to export your save, due to unsufficient permissions.\nGo into the settings to grant access to the file again.
